# GitHub Actions CI for the jq DuckDB extension.
# Builds and tests on all community-extension platforms.
# Generated by quack-rs scaffold — customize as needed.

name: Extension CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_amd64
          - os: macos-latest
            platform: osx_arm64
          - os: windows-latest
            platform: windows_amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      # dtolnay/rust-toolchain is intentionally ref-pinned (not SHA-pinned)
      # because its SHA changes with each Rust release.
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo fmt -- --check

      - name: Build (release)
        run: cargo build --release

      - name: Unit tests
        run: cargo test

      - name: Install DuckDB CLI
        uses: duckdb/duckdb-build@v1
        with:
          version: v1.5.0

      - name: SQLLogicTest (E2E)
        run: make test
        env:
          DUCKDB_PLATFORM: ${{ matrix.platform }}
